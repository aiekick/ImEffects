name: Emscripten

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_SUBMODULES }}
          submodules: recursive

      - name: Install Ninja
        run: sudo apt-get install -y ninja-build

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Configure
        run: cmake --preset linux-emscripten

      - name: Build
        run: cmake --build --preset linux-emscripten

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy
          BUILD_DIR=bin
          cp ${BUILD_DIR}/ImEffects_opengl3_Emscripten_.html deploy/index.html
          cp ${BUILD_DIR}/ImEffects_opengl3_Emscripten_.js   deploy/
          cp ${BUILD_DIR}/ImEffects_opengl3_Emscripten_.wasm deploy/
          # .data file is generated by --preload-file (may not exist if no resources)
          cp ${BUILD_DIR}/ImEffects_opengl3_Emscripten_.data deploy/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
